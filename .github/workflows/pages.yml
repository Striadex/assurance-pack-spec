name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        run: |
          # GitHub Pages will serve schemas, context, examples, and docs at spec.striadex.ai
          # via the CNAME file at the repo root. The layout below mirrors the URL structure
          # that Packs reference (e.g. https://spec.striadex.ai/v0.1/schemas/...).
          mkdir -p _site
          cp -r schemas _site/
          cp -r context _site/
          cp -r examples _site/
          cp -r docs _site/docs
          cp README.md _site/index.md
          cp CNAME _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
